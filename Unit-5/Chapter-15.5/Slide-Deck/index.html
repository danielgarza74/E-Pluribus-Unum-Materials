<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture 15.5: The Holocaust</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            overflow: hidden;
            background-color: #020617; /* slate-950 */
        }
        
        #slides-wrapper {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            height: 100%;
            width: 100%;
        }

        .slide {
            flex: 0 0 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Reduced padding to maximize slide size */
            padding: 0.5rem; 
            transition: opacity 0.6s ease;
            box-sizing: border-box;
        }

        .slide img {
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: scale(0.98);
            opacity: 0.5;
            /* Ensure image fills the space without cropping */
            width: 100%;
            height: 100%;
            object-contain: contain;
        }

        .slide.active img {
            transform: scale(1);
            opacity: 1;
        }

        #eq-container {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(10px);
        }

        #eq-container.active {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

            </article>
            <!-- Slide 04 -->

            </article>
            <!-- Slide 12 -->

            </article>
            <!-- Slide 13 -->

            </article>
        </div>

    <!-- The Consolidated Bottom Bar -->
    <div id="bottom-bar" class="flex-shrink-0 bg-slate-900 border-t border-yellow-600 shadow-[0_-4px_20px_rgba(0,0,0,0.5)] z-20">
        <!-- Progress Bar -->
        <div class="h-1 w-full bg-slate-800">
            <div id="progress-bar" class="h-full bg-yellow-500 transition-all duration-300"></div>
        </div>
        
        <div class="flex items-center justify-between px-4 py-3 md:px-8">
            <!-- Left Section: Title -->
            <div class="flex-1 hidden md:block">
                <h1 class="text-sm font-bold tracking-wider text-slate-300 uppercase">
                    Lecture 15.5: The Holocaust
                </h1>
                <p class="text-xs text-slate-500">Unit 5: Boom, Bust, & War</p>
            </div>

            <!-- Center Section: Cue Question -->
            <div id="eq-container" class="flex-[2] flex items-center justify-center gap-3 opacity-0 invisible">
                <span class="bg-yellow-600 text-yellow-50 text-[10px] md:text-xs font-black uppercase px-2 py-1 rounded shadow-sm whitespace-nowrap">
                    Cue Question
                </span>
                <p id="eq-text" class="text-xs md:text-sm italic text-yellow-100 line-clamp-2 text-center max-w-xl"></p>
            </div>

            <!-- Right Section: Controls -->
            <div class="flex-1 flex items-center justify-end gap-2 md:gap-4">
                <div class="text-xs md:text-sm font-mono text-slate-400 mr-2">
                    <span id="slide-counter" class="text-white">01</span> / 13
                </div>

                <div class="flex bg-slate-800 rounded-lg p-1 border border-slate-700">
                    <button onclick="prevSlide()" class="p-2 hover:bg-slate-700 rounded-md transition-colors text-white disabled:opacity-30 disabled:cursor-not-allowed" id="prev-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    </button>
                    <button onclick="nextSlide()" class="p-2 hover:bg-slate-700 rounded-md transition-colors text-white disabled:opacity-30 disabled:cursor-not-allowed" id="next-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                    </button>
                </div>

                <button onclick="toggleFullScreen()" class="p-2 bg-slate-800 border border-slate-700 rounded-lg hover:bg-slate-700 text-yellow-400 transition-colors" title="Toggle Fullscreen">
                    <svg id="fs-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentSlideIndex = 0;
        const totalSlides = 13;
        const wrapper = document.getElementById('slides-wrapper');
        const slides = document.querySelectorAll('.slide');
        const progressBar = document.getElementById('progress-bar');
        const slideCounter = document.getElementById('slide-counter');
        const eqContainer = document.getElementById('eq-container');
        const eqText = document.getElementById('eq-text');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        const cueQuestions = {
            4: "How did the Nazi regime use pseudo-science and distorted Social Darwinism to justify their racial hierarchy and biological anti-Semitism?",
            5: "What steps did the Nazi government take to systematically strip Jewish citizens of their rights, professions, and property through legislation like the Nuremberg Laws?",
            6: "How did Kristallnacht mark a turning point from legal discrimination to state-sponsored physical violence and mass detention?",
            7: "In what ways did the establishment of ghettos and the mobile killing units (Einsatzgruppen) represent a dangerous escalation in the systematic destruction of European Jews?",
            8: "How did the 1942 Wannsee Conference transform scattered persecution into a coordinated, continent-wide system of industrialized mass murder?",
            9: "Despite overwhelming odds, what were the various ways in which Jewish people and others resisted the Nazi regime both physically and spiritually?",
            10: "What was the geographic scale of the Nazi camp network, and what was the distinction between concentration camps and purpose-built death camps like Auschwitz-Birkenau?",
            11: "How did the initial Allied response to the Holocaust compare to the moral courage demonstrated by individuals known as the 'Righteous Among the Nations'?",
            12: "What was the significance of the Nuremberg Trials in holding individuals accountable for 'crimes against humanity' and shaping modern international law?",
            13: "Why is preserving witness testimony, such as that of Elie Wiesel, essential for holocaust education and modern genocide prevention?"
        };

        function updateUI() {
            // Smooth slide transition using transform
            wrapper.style.transform = `translateX(-${currentSlideIndex * 100}%)`;
            
            // Update Active Class for image scaling
            slides.forEach((slide, index) => {
                if (index === currentSlideIndex) {
                    slide.classList.add('active');
                } else {
                    slide.classList.remove('active');
                }
            });

            // Update Counter & Progress
            const displayNum = (currentSlideIndex + 1).toString().padStart(2, '0');
            slideCounter.textContent = displayNum;
            const progress = ((currentSlideIndex + 1) / totalSlides) * 100;
            progressBar.style.width = `${progress}%`;

            // Update Cue Question with animation
            const question = cueQuestions[currentSlideIndex + 1];
            if (question) {
                eqText.textContent = question;
                eqContainer.classList.add('active');
                eqContainer.classList.remove('opacity-0', 'invisible');
            } else {
                eqContainer.classList.remove('active');
                eqContainer.classList.add('opacity-0', 'invisible');
            }

            // Update Buttons
            prevBtn.disabled = currentSlideIndex === 0;
            nextBtn.disabled = currentSlideIndex === totalSlides - 1;
        }

        function nextSlide() {
            if (currentSlideIndex < totalSlides - 1) {
                currentSlideIndex++;
                updateUI();
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateUI();
            }
        }

        function toggleFullScreen() {
            const app = document.getElementById('presentation-app');
            if (!document.fullscreenElement) {
                app.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const icon = document.getElementById('fs-icon');
            if (document.fullscreenElement) {
                icon.innerHTML = '<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>';
            } else {
                icon.innerHTML = '<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>';
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            }
        });

        updateUI();
    </script>
</body>
</html>
